services:
  - type: web
    name: campus-agent-simulation
    runtime: python
    buildCommand: pip install -r requirements.txt && python scripts/init_campus.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: LLM_API_KEY
        sync: false
      - key: LLM_API_URL
        sync: false
